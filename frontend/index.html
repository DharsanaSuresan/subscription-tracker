<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>SubTrack — Sign in</title>
  <link rel="stylesheet" href="css/style.css"/>
  <script>
    // Prevent flash of wrong theme
    const t = localStorage.getItem('theme') || 'light';
    document.documentElement.setAttribute('data-theme', t);
  </script>
</head>
<body>
  <div class="auth-wrap">
    <div class="auth-card">
      <div class="auth-header">
        <div>
          <h1 class="auth-title" id="auth-title">Welcome back</h1>
          <p class="auth-subtitle" id="auth-subtitle">Sign in to your account</p>
        </div>
        <div class="theme-toggle-wrap">
          <span class="theme-label" id="theme-label">☀️</span>
          <button class="theme-toggle" id="theme-toggle" aria-label="Toggle theme"></button>
        </div>
      </div>

      <div id="alert" class="alert"></div>

      <form id="auth-form" novalidate>
        <div class="form-group" id="name-group" style="display:none">
          <label for="name">Full name</label>
          <input type="text" id="name" placeholder="John Doe" autocomplete="name"/>
        </div>
        <div class="form-group">
          <label for="email">Email</label>
          <input type="email" id="email" placeholder="you@email.com" required autocomplete="email"/>
        </div>
        <div class="form-group">
          <label for="password">Password</label>
          <input type="password" id="password" placeholder="••••••••" required autocomplete="current-password" minlength="6"/>
        </div>
        <button type="submit" class="btn-primary" id="submit-btn">Sign in</button>
      </form>

      <p class="auth-toggle" id="toggle-text">
        Don't have an account? <a href="#" id="toggle-link">Sign up</a>
      </p>
    </div>
  </div>

  <script type="module" src="js/auth.js"></script>
</body>
</html>
