<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>SubTrack — Add Subscription</title>
  <link rel="stylesheet" href="css/style.css"/>
</head>
<body>
  <nav class="nav">
    <a href="dashboard.html" class="nav-logo">SubTrack</a>
    <div class="nav-user">
      <span class="nav-name" id="nav-name"></span>
      <button class="btn-sm btn-ghost" id="logout-btn">Sign out</button>
    </div>
  </nav>

  <div class="page">
    <a href="dashboard.html" class="back-link">← Back to dashboard</a>

    <div class="form-card">
      <h1 class="form-title">Add subscription</h1>
      <p class="form-subtitle">Fill in the details of your new subscription</p>

      <div id="alert" class="alert"></div>

      <form id="add-form" novalidate>
        <div class="form-group">
          <label for="name">Service name</label>
          <input type="text" id="name" placeholder="Netflix, Spotify, GitHub…" required/>
        </div>

        <div class="form-row">
          <div class="form-group">
            <label for="price">Price</label>
            <input type="number" id="price" placeholder="9.99" min="0" step="0.01" required/>
          </div>
          <div class="form-group">
            <label for="currency">Currency</label>
            <select id="currency">
              <option value="USD">USD</option>
              <option value="EUR">EUR</option>
              <option value="GBP">GBP</option>
              <option value="INR">INR</option>
              <option value="AUD">AUD</option>
              <option value="CAD">CAD</option>
              <option value="JPY">JPY</option>
            </select>
          </div>
        </div>

        <div class="form-row">
          <div class="form-group">
            <label for="frequency">Billing frequency</label>
            <select id="frequency">
              <option value="Monthly">Monthly</option>
              <option value="Yearly">Yearly</option>
              <option value="Weekly">Weekly</option>
              <option value="Daily">Daily</option>
            </select>
          </div>
          <div class="form-group">
            <label for="category">Category</label>
            <select id="category" required>
              <option value="">Select…</option>
              <option value="Entertainment">Entertainment</option>
              <option value="Productivity">Productivity</option>
              <option value="Education">Education</option>
              <option value="Health">Health</option>
              <option value="Finance">Finance</option>
              <option value="Other">Other</option>
            </select>
          </div>
        </div>

        <div class="form-group">
          <label for="paymentMethod">Payment method</label>
          <input type="text" id="paymentMethod" placeholder="Visa •••• 4242, PayPal…" required/>
        </div>

        <div class="form-group">
          <label for="startDate">Start date</label>
          <input type="date" id="startDate" required/>
        </div>

        <button type="submit" class="btn-primary" id="submit-btn">Add subscription</button>
      </form>
    </div>
  </div>

  <script type="module" src="js/add.js"></script>
</body>
</html>
